<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control D</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #43e97b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; padding: 0 0 40px 0; }
  header { padding: 24px 20px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.8); } }
  .refresh-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:active { transform: scale(0.95); background: var(--border); }
  .tabs { display: flex; padding: 16px 20px 0; gap: 4px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all 0.2s; position: relative; bottom: -1px; }
  .tab.active { color: var(--text); background: var(--surface); border-color: var(--border); border-bottom-color: var(--surface); }
  .content { padding: 20px; }
  .section { display: none; }
  .section.active { display: block; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; transition: border-color 0.2s; }
  .device-name { font-size: 18px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.3px; }
  .device-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  .current-profile { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
  .profile-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .profile-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-right: 4px; }
  .profile-name { font-size: 14px; font-weight: 600; color: var(--green); }
  .change-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 13px; border-radius: 10px; font-family: var(--font-display); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .change-btn:active { transform: scale(0.97); opacity: 0.9; }
  .profile-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; }
  .profile-card-name { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
  .profile-card-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; padding: 24px; animation: slideUp 0.3s ease; max-height: 80vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .modal-subtitle { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-bottom: 24px; }
  .profile-option { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
  .profile-option:active { border-color: var(--accent); transform: scale(0.98); }
  .profile-option.current { border-color: var(--green); }
  .profile-option-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .profile-option-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .current-badge { font-size: 10px; background: var(--green); color: #000; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-family: var(--font-mono); white-space: nowrap; }
  .cancel-btn { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 14px; border-radius: 12px; font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
  .cancel-btn:active { background: var(--border); }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 13px; z-index: 200; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.error { background: var(--accent2); color: white; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .error-msg { text-align: center; padding: 40px 20px; color: var(--accent2); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }
  .section-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; padding-left: 2px; }
  .passcode-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 150; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
  .passcode-overlay.open { display: flex; }
  .passcode-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; width: 90%; max-width: 340px; text-align: center; }
  .passcode-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .passcode-subtitle { font-size: 13px; color: var(--muted); font-family: var(--font-mono); margin-bottom: 28px; line-height: 1.5; }
  .passcode-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 12px; font-family: var(--font-mono); font-size: 20px; text-align: center; letter-spacing: 8px; margin-bottom: 16px; outline: none; }
  .passcode-input:focus { border-color: var(--accent); }
  .passcode-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
  .passcode-cancel { width: 100%; background: transparent; border: none; color: var(--muted); padding: 10px; font-family: var(--font-display); font-size: 14px; cursor: pointer; }
  .passcode-error { color: var(--accent2); font-size: 13px; font-family: var(--font-mono); margin-bottom: 14px; display: none; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Control D</div>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('devices')">Devices</div>
  <div class="tab" onclick="switchTab('profiles')">Profiles</div>
</div>

<div class="content">
  <div id="devices" class="section active">
    <div class="loading" id="devices-loading"><div class="spinner"></div>Loading devices...</div>
    <div id="devices-list"></div>
  </div>
  <div id="profiles" class="section">
    <div class="loading" id="profiles-loading"><div class="spinner"></div>Loading profiles...</div>
    <div id="profiles-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-device-name">Change Profile</div>
    <div class="modal-subtitle" id="modal-device-id"></div>
    <div id="modal-profiles"></div>
    <button class="cancel-btn" onclick="closeModalDirect()">Cancel</button>
  </div>
</div>

<div class="passcode-overlay" id="passcode-overlay">
  <div class="passcode-box">
    <div class="passcode-title">🔒 Adult Profile</div>
    <div class="passcode-subtitle">Enter passcode to continue</div>
    <div class="passcode-error" id="passcode-error">Incorrect passcode. Try again.</div>
    <input class="passcode-input" id="passcode-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••">
    <button class="passcode-btn" onclick="submitPasscode()">Confirm</button>
    <button class="passcode-cancel" onclick="closePasscode()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'api.df03e5eb81b8afb58a9044b6e52f1541462bb2b372b1433faef8908de99a5be7';
const BASE = 'https://controld-proxy.waqaar06.workers.dev';
const PASSCODE = '6806';
const ADULT_KEYWORDS = ['adult'];

let allProfiles = [];
let allDevices = [];
let pendingProfileId = null;
let pendingProfileName = null;
let pendingDeviceId = null;

async function apiFetch(path) {
  const res = await fetch(BASE + path, { headers: { 'Authorization': 'Bearer ' + API_KEY } });
  return res.json();
}

async function loadAll() { loadDevices(); loadProfiles(); }

async function loadDevices() {
  document.getElementById('devices-loading').style.display = 'block';
  document.getElementById('devices-list').innerHTML = '';
  try {
    const data = await apiFetch('/devices');
    allDevices = data.body.devices;
    renderDevices(allDevices);
  } catch(e) {
    document.getElementById('devices-list').innerHTML = '<div class="error-msg">Failed to load devices</div>';
  }
  document.getElementById('devices-loading').style.display = 'none';
}

async function loadProfiles() {
  document.getElementById('profiles-loading').style.display = 'block';
  document.getElementById('profiles-list').innerHTML = '';
  try {
    const data = await apiFetch('/profiles');
    allProfiles = data.body.profiles;
    renderProfiles(allProfiles);
  } catch(e) {
    document.getElementById('profiles-list').innerHTML = '<div class="error-msg">Failed to load profiles</div>';
  }
  document.getElementById('profiles-loading').style.display = 'none';
}

function renderDevices(devices) {
  const el = document.getElementById('devices-list');
  el.innerHTML = '<div class="section-label">' + devices.length + ' devices</div>';
  devices.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    const deviceId = d.device_id;
    card.innerHTML = `
      <div class="device-name">${d.name}</div>
      <div class="device-id">${d.device_id}</div>
      <div class="current-profile">
        <div class="profile-dot"></div>
        <span class="profile-label">PROFILE</span>
        <span class="profile-name">${d.profile ? d.profile.name : 'None'}</span>
      </div>
      <button class="change-btn" onclick="openModal('${deviceId}')">Change Profile</button>
    `;
    el.appendChild(card);
  });
}

function renderProfiles(profiles) {
  const el = document.getElementById('profiles-list');
  el.innerHTML = '<div class="section-label">' + profiles.length + ' profiles</div>';
  profiles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `<div class="profile-card-name">${p.name}</div><div class="profile-card-id">${p.PK}</div>`;
    el.appendChild(card);
  });
}

function isAdultProfile(name) {
  return ADULT_KEYWORDS.some(k => name.toLowerCase().includes(k));
}

function openModal(deviceId) {
  if (allProfiles.length === 0) { showToast('Profiles still loading...', true); return; }
  const device = allDevices.find(d => d.device_id === deviceId);
  document.getElementById('modal-device-name').textContent = device.name;
  document.getElementById('modal-device-id').textContent = deviceId;
  const container = document.getElementById('modal-profiles');
  container.innerHTML = '';
  allProfiles.forEach(p => {
    const isCurrent = device.profile && device.profile.PK === p.PK;
    const opt = document.createElement('div');
    opt.className = 'profile-option' + (isCurrent ? ' current' : '');
    opt.innerHTML = `
      <div>
        <div class="profile-option-name">${p.name} ${isAdultProfile(p.name) ? '🔒' : ''}</div>
        <div class="profile-option-id">${p.PK}</div>
      </div>
      ${isCurrent ? '<span class="current-badge">ACTIVE</span>' : ''}
    `;
    if (!isCurrent) {
      const did = deviceId;
      const pid = p.PK;
      const pname = p.name;
      opt.onclick = () => handleProfileSelect(did, pid, pname);
    }
    container.appendChild(opt);
  });
  document.getElementById('modal').classList.add('open');
}

function handleProfileSelect(deviceId, profileId, profileName) {
  closeModalDirect();
  if (isAdultProfile(profileName)) {
    pendingDeviceId = deviceId;
    pendingProfileId = profileId;
    pendingProfileName = profileName;
    openPasscode();
  } else {
    changeProfile(deviceId, profileId, profileName);
  }
}

function openPasscode() {
  document.getElementById('passcode-input').value = '';
  document.getElementById('passcode-error').style.display = 'none';
  document.getElementById('passcode-overlay').classList.add('open');
  setTimeout(() => document.getElementById('passcode-input').focus(), 300);
}

function closePasscode() {
  document.getElementById('passcode-overlay').classList.remove('open');
  pendingDeviceId = null; pendingProfileId = null; pendingProfileName = null;
}

function submitPasscode() {
  const entered = document.getElementById('passcode-input').value;
  if (entered === PASSCODE) {
    const did = pendingDeviceId;
    const pid = pendingProfileId;
    const pname = pendingProfileName;
    closePasscode();
    changeProfile(did, pid, pname);
  } else {
    document.getElementById('passcode-error').style.display = 'block';
    document.getElementById('passcode-input').value = '';
    document.getElementById('passcode-input').focus();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('passcode-overlay').classList.contains('open')) submitPasscode();
});

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); }

async function changeProfile(deviceId, profileId, profileName) {
  console.log('deviceId:', deviceId, 'profileId:', profileId);
  showToast('Updating...');
  try {
    const res = await fetch(BASE + '/devices/' + deviceId, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: 'profile_id=' + profileId
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ Profile updated to ' + profileName);
      const device = allDevices.find(d => d.device_id === deviceId);
      if (device) device.profile = { PK: profileId, name: profileName };
      renderDevices(allDevices);
    } else {
      showToast('Failed to update', true);
    }
  } catch(e) {
    showToast('Error updating profile', true);
  }
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(tab).classList.add('active');
}

loadAll();
</script>
</body>
</html>
